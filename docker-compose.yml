services:
  telegram-forwarder:
    build: .
    image: telegram-user-forwarder:latest
    ports:
      - "7860:7860"
    environment:
      PORT: "7860"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_USER_SESSION: "${TELEGRAM_USER_SESSION}"
      TELEGRAM_TARGET: "${TELEGRAM_TARGET}"
      USERBOT_ALLOWED_SOURCE_CHATS: "${USERBOT_ALLOWED_SOURCE_CHATS:-}"
      USERBOT_BLOCKED_SOURCE_CHATS: "${USERBOT_BLOCKED_SOURCE_CHATS:-}"
      USERBOT_SKIP_TARGET_CHAT: "${USERBOT_SKIP_TARGET_CHAT:-true}"
      USERBOT_INCLUDE_OUTGOING: "${USERBOT_INCLUDE_OUTGOING:-true}"
      USERBOT_SILENT: "${USERBOT_SILENT:-false}"
      USERBOT_DROP_AUTHOR: "${USERBOT_DROP_AUTHOR:-false}"
      USERBOT_PROTECT_CONTENT: "${USERBOT_PROTECT_CONTENT:-false}"
      USERBOT_RECONNECT_DELAY_MS: "${USERBOT_RECONNECT_DELAY_MS:-5000}"
      USERBOT_LOG_LEVEL: "${USERBOT_LOG_LEVEL:-info}"
    restart: unless-stopped
