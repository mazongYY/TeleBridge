services:
  telebridge:
    build: .
    image: telebridge:latest
    ports:
      - "7860:7860"
    environment:
      PORT: "7860"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_USER_SESSION: "${TELEGRAM_USER_SESSION}"
      TELEGRAM_TARGET: "${TELEGRAM_TARGET}"
      FEISHU_WEBHOOK_URL: "${FEISHU_WEBHOOK_URL:-}"
      USERBOT_MONITORED_CHAT_TYPES: "${USERBOT_MONITORED_CHAT_TYPES:-private,group,channel,official}"
      USERBOT_ALLOWED_SOURCE_CHATS: "${USERBOT_ALLOWED_SOURCE_CHATS:-}"
      USERBOT_BLOCKED_SOURCE_CHATS: "${USERBOT_BLOCKED_SOURCE_CHATS:-}"
      USERBOT_SKIP_TARGET_CHAT: "${USERBOT_SKIP_TARGET_CHAT:-true}"
      USERBOT_INCLUDE_OUTGOING: "${USERBOT_INCLUDE_OUTGOING:-true}"
      USERBOT_SILENT: "${USERBOT_SILENT:-false}"
      USERBOT_DROP_AUTHOR: "${USERBOT_DROP_AUTHOR:-false}"
      USERBOT_PROTECT_CONTENT: "${USERBOT_PROTECT_CONTENT:-false}"
      USERBOT_KEEPALIVE_ENABLED: "${USERBOT_KEEPALIVE_ENABLED:-true}"
      USERBOT_KEEPALIVE_INTERVAL_MINUTES: "${USERBOT_KEEPALIVE_INTERVAL_MINUTES:-360}"
      USERBOT_KEEPALIVE_MESSAGE: "${USERBOT_KEEPALIVE_MESSAGE:-📡 转发器保活提醒}"
      USERBOT_DAILY_REPORT_ENABLED: "${USERBOT_DAILY_REPORT_ENABLED:-true}"
      USERBOT_DAILY_REPORT_TIME: "${USERBOT_DAILY_REPORT_TIME:-23:55}"
      USERBOT_DAILY_REPORT_TIMEZONE_OFFSET: "${USERBOT_DAILY_REPORT_TIMEZONE_OFFSET:-+08:00}"
      USERBOT_RECONNECT_DELAY_MS: "${USERBOT_RECONNECT_DELAY_MS:-5000}"
      USERBOT_LOG_LEVEL: "${USERBOT_LOG_LEVEL:-info}"
    restart: unless-stopped
